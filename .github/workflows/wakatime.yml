name: WakaTime Progress

on:
  schedule:
    - cron: "0 0 * * *" # Roda automaticamente à meia-noite
  workflow_dispatch: # Permite que você rode manualmente para testar

jobs:
  update-readme:
    name: Update WakaTime Stats
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}